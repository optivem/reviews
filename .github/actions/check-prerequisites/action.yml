name: Check Module Prerequisites
description: Verifies that the previous module is "Done" before allowing a new ticket.

inputs:
  project-key:
    description: The project key (e.g. "eshp").
    required: true
  course-id:
    description: The course id (e.g. "atdd", "pipeline").
    required: true
  module-num:
    description: The module number (e.g. "2").
    required: true
  github-token:
    description: Token with project read access.
    required: true

outputs:
  allowed:
    description: "'true' if the previous module is complete or this is module 1."
    value: ${{ steps.check.outputs.allowed }}
  incomplete-module:
    description: "The previous module name if it is not yet complete."
    value: ${{ steps.check.outputs.incomplete_module }}

runs:
  using: composite
  steps:
    - name: Check prerequisites
      id: check
      uses: actions/github-script@v8
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const { loadConfig } = require('./scripts/load-config.cjs');
          const config = loadConfig('.');
          const projectKey = '${{ inputs.project-key }}'.toLowerCase();
          const courseId = '${{ inputs.course-id }}';
          const moduleNum = '${{ inputs.module-num }}';
          const projectId = config.board.id;

          const course = config.courses.find(c => c.id === courseId);
          if (!course) {
            core.setOutput('allowed', 'true');
            core.setOutput('incomplete_module', '');
            return;
          }

          // Find current module index
          const moduleIndex = course.modules.findIndex(m => m.number === moduleNum);
          if (moduleIndex <= 0) {
            // First module or not found — no prerequisites
            core.setOutput('allowed', 'true');
            core.setOutput('incomplete_module', '');
            return;
          }

          const prevModule = course.modules[moduleIndex - 1];

          // Find the issue for the previous module + this project
          const projectLabel = `project-${projectKey}`;
          const courseLabel = `course-${courseId}`;
          const moduleLabel = `module-${prevModule.label || prevModule.number}`;

          const issues = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            labels: `${projectLabel},${courseLabel},${moduleLabel}`,
            state: 'all',
            per_page: 100
          });

          const prevModuleName = `${prevModule.number} - ${prevModule.name}`;

          if (issues.data.length === 0) {
            core.setOutput('allowed', 'false');
            core.setOutput('incomplete_module', prevModuleName);
            return;
          }

          // Check the status of the first matching issue on the project board
          const issue = issues.data[0];
          const result = await github.graphql(`
            query($issueId: ID!) {
              node(id: $issueId) {
                ... on Issue {
                  projectItems(first: 10) {
                    nodes {
                      project { id }
                      fieldValueByName(name: "Status") {
                        ... on ProjectV2ItemFieldSingleSelectValue {
                          name
                        }
                      }
                    }
                  }
                }
              }
            }
          `, { issueId: issue.node_id });

          const item = result.node.projectItems.nodes.find(n => n.project.id === projectId);
          const status = item?.fieldValueByName?.name || '';
          if (status === 'Done') {
            core.setOutput('allowed', 'true');
            core.setOutput('incomplete_module', '');
          } else {
            core.setOutput('allowed', 'false');
            core.setOutput('incomplete_module', prevModuleName);
          }
