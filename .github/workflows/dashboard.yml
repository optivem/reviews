name: dashboard

on:
  # Disabled: bursts of issue events (e.g. rapid ticket creation) trigger a
  # workflow_run storm, and with cancel-in-progress: true most deploys get
  # cancelled mid-flight, leaving Pages stale. Scheduled refresh covers it.
  # workflow_run:
  #   workflows:
  #     - auto-on-created
  #     - auto-on-closed
  #     - auto-on-comment
  #     - auto-on-edited
  #     - auto-on-reopened
  #   types: [completed]
  push:
    branches: [main]
  schedule:
    - cron: '*/5 * * * *'  # every 5 minutes
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: dashboard
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Generate dashboard
        env:
          GITHUB_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
        run: node scripts/generate-dashboard.mjs

      - uses: actions/configure-pages@v6

      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - uses: actions/upload-pages-artifact@v5

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
