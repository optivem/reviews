name: auto-on-deleted

on:
  issues:
    types: [deleted]

jobs:
  log-deletion:
    runs-on: ubuntu-latest
    steps:
      - name: Log deleted issue
        run: echo "Issue #${{ github.event.issue.number }} (${{ github.event.issue.title }}) deleted by @${{ github.event.sender.login }}. Dashboard will refresh via workflow_run."
